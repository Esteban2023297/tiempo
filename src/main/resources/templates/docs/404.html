<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>404 - Error en la Matriz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        body {
            background: #050505;
            color: #bc61ff;
            font-family: 'Syncopate', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        h1 { font-size: 8rem; margin: 0; text-shadow: 0 0 20px #bc61ff; animation: glitch 0.5s infinite; }
        p { font-family: 'Plus Jakarta Sans', sans-serif; color: white; opacity: 0.7; margin-bottom: 2rem; }
        .btn-back {
            padding: 15px 30px;
            border: 2px solid #bc61ff;
            color: #bc61ff;
            text-decoration: none;
            border-radius: 50px;
            transition: 0.3s;
        }
        .btn-back:hover { background: #bc61ff; color: #050505; box-shadow: 0 0 20px #bc61ff; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(-5px, -5px); }
            60% { transform: translate(5px, 5px); }
            80% { transform: translate(5px, -5px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
<h1>404</h1>
<h3>SISTEMA FUERA DE LÍNEA</h3>
<p>Te perdiste en nuestra galaxia, pero aquí siempre hay un camino de vuelta.</p>
<a href="home.html" class="btn-back">VOLVER AL CENTRO DE MANDO</a>
</body>
</html>
