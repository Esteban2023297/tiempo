<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        /* 1. Definición de las Animaciones (Keyframes) */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 2. Aplicación de estilos y transiciones al Hero */
        .hero {
            background: linear-gradient(135deg, #ffffff 0%, #f0f4ff 100%); /* Un degradado sutil */
            border: 1px solid rgba(37, 99, 235, 0.1);
            transition: transform 0.3s ease;
        }

        .hero:hover {
            transform: scale(1.01); /* Pequeño efecto de elevación al pasar el mouse */
        }

        /* 3. Animando cada elemento con retrasos (delays) */
        .hero h2 {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .hero p {
            animation: fadeInUp 0.8s ease-out 0.3s forwards; /* Empieza 0.3s después */
            opacity: 0; /* Para que no se vea antes de la animación */
        }

        .hero .btn {
            animation: fadeInUp 0.8s ease-out 0.6s forwards; /* Empieza 0.6s después */
            opacity: 0;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        /* Animación para el Logo */
        .logo {
            animation: slideInLeft 0.8s ease-out;
        }

        /* Animación para los enlaces del menú */
        .nav-links li {
            animation: fadeInUp 0.5s ease-out;
        }

        /* Efecto de "Pulso" para el botón para que llame la atención */
        .btn {
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
            background-color: #1d4ed8;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Mi Proyecto</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

        <li><a href="album.html">Álbum</a></li>
    </ul>

        <a href="biografia.html" class="btn">Conocer más sobre mí</a>
    </section>
</main>

</body>
</html>
