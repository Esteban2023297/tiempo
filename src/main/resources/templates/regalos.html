<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regalos Especiales - Kuromi Love</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@400;700&display=swap');

        :root {
            --morado-neon: #bc61ff;
            --lila-vivido: #8b5cf6;
            --negro-profundo: #050505;
            --gris-oscuro: #111111;
            --blanco-puro: #ffffff;
            --glow: 0 0 15px rgba(188, 97, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--negro-profundo);
            background-image: radial-gradient(var(--lila-vivido) 0.8px, transparent 0.8px);
            background-size: 40px 40px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--blanco-puro);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAVEGACIÓN --- */
        nav {
            background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(10px);
            margin: 20px; padding: 1.2rem 2.5rem; border-radius: 50px;
            border: 1px solid var(--morado-neon); display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: var(--glow); position: sticky; top: 20px; z-index: 1000;
        }
        .logo { font-family: 'Syncopate', sans-serif; color: var(--morado-neon); text-decoration: none; font-size: 1.2rem; letter-spacing: 3px; text-shadow: var(--glow); }
        .nav-links { list-style: none; display: flex; }
        .nav-links a { text-decoration: none; color: var(--blanco-puro); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; margin-left: 20px; transition: 0.3s; }
        .nav-links a:hover { color: var(--morado-neon); text-shadow: var(--glow); }

        main { padding: 20px; max-width: 1100px; margin: 0 auto; position: relative; z-index: 10; }

        h2 {
            font-family: 'Syncopate', sans-serif; font-size: 1.8rem; color: var(--morado-neon);
            text-align: center; margin: 3rem 0 1.5rem; letter-spacing: 4px; text-shadow: var(--glow);
        }

        /* --- FRASCO --- */
        .frasco-section {
            text-align: center; background: rgba(17, 17, 17, 0.6); backdrop-filter: blur(8px);
            padding: 40px; border-radius: 30px; border: 1px solid var(--morado-neon);
            margin-bottom: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .frasco-display {
            min-height: 120px; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 700; color: var(--blanco-puro);
            margin: 20px 0; padding: 25px; border: 2px dashed var(--morado-neon);
            border-radius: 15px; transition: all 0.5s ease;
        }
        .btn-magico {
            background: var(--morado-neon); color: var(--negro-profundo); border: none;
            padding: 15px 35px; font-family: 'Syncopate', sans-serif; font-size: 0.8rem;
            border-radius: 50px; cursor: pointer; transition: 0.3s; box-shadow: var(--glow);
        }
        .btn-magico:hover { transform: scale(1.1); background: var(--blanco-puro); box-shadow: 0 0 25px var(--morado-neon); }

        /* --- CUPONES / FOTOS --- */
        .cupones-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-bottom: 50px; }
        .cupon {
            background: rgba(17, 17, 17, 0.6); backdrop-filter: blur(8px);
            border: 2px dashed var(--morado-neon); padding: 30px; border-radius: 15px;
            position: relative; transition: 0.4s;
        }
        .cupon h3 { font-family: 'Syncopate', sans-serif; font-size: 0.95rem; margin-bottom: 12px; color: var(--morado-neon); }
        .cupon img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; border: 1px solid var(--morado-neon); margin-bottom: 15px; }

        /* LLUVIA Y EFECTOS */
        .corazon { position: fixed; top: -50px; font-size: 1.5rem; user-select: none; pointer-events: none; z-index: 1; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        footer { text-align: center; padding: 4rem; opacity: 0.4; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; }
    </style>
</head>
<body>

<nav>
    <a href="home.html" class="logo">KUROMI x LOVE</a>
    <ul class="nav-links">
        <li><a href="home.html">Inicio</a></li>
        <li><a href="biografia.html">Historia</a></li>
        <li><a href="nuestro-mundo.html">Nuestro Mundo</a></li>
        <li><a href="cartas.html">Cartas</a></li>
        <li><a href="regalos.html">Regalos</a></li>
    </ul>
</nav>

<main>
    <section class="frasco-section">
        <h2>💌 Frasco de Estrellas</h2>
        <div class="frasco-display" id="mensaje-texto">Haz clic abajo para abrir una estrella...</div>
        <button class="btn-magico" onclick="abrirEstrella()">ABRIR ESTRELLA ✨</button>
    </section>

    <h2>🎁 Nuestros Regalos</h2>
    <div class="cupones-grid" id="regalos-container">
    </div>
</main>

<footer><p>SISTEMA DE AMOR KUROMI v1.0 • 2026</p></footer>

<script>
    // Frasco de estrellas
    const mensajes = ["Eres lo mejor que me ha pasado. ✨", "Me encanta tu sonrisa. 💜", "Gracias por todo. 🖤"];
    function abrirEstrella() {
        const display = document.getElementById('mensaje-texto');
        const indice = Math.floor(Math.random() * mensajes.length);
        display.innerText = mensajes[indice];
    }

    // Sistema de Fotos de Regalos
    const misRegalos = [
        { foto: "img/regalo1.jpg", titulo: "Regalo 1", desc: "Descripción del regalo..." },
        { foto: "img/regalo2.jpg", titulo: "Regalo 2", desc: "Descripción del regalo..." }
    ];

    const contenedor = document.getElementById('regalos-container');
    misRegalos.forEach(r => {
        const div = document.createElement('div');
        div.className = 'cupon';
        div.innerHTML = `
            <img src="${r.foto}" alt="Regalo" loading="lazy">
            <h3>${r.titulo}</h3>
            <p>${r.desc}</p>
        `;
        contenedor.appendChild(div);
    });

    // Lluvia
    setInterval(() => {
        const h = document.createElement('div'); h.className='corazon'; h.innerText=['💜','🖤','💀','✨'][Math.floor(Math.random()*4)];
        h.style.left=Math.random()*100+'vw'; h.style.animationDuration=(Math.random()*4+3)+'s';
        document.body.appendChild(h); setTimeout(()=>h.remove(), 7000);
    }, 300);
</script>
</body>
</html>
